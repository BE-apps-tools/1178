name = "asset-portal"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Non-secret variables live here so they survive every (Git-connected) redeploy.
# (Previously set only in the dashboard, they were wiped on each `wrangler deploy`.)
[vars]
GH_REPO = "be-apps-tools/1127"
ALLOWED_ORIGIN = "https://be-apps-tools.github.io"

# Secrets are set in the Cloudflare dashboard (they persist across deploys):
#   GH_TOKEN    – fine-grained PAT, Issues read+write
#   SUBMIT_KEY  – public spam-deterrent for reassignment requests
#   ADMIN_KEY   – private gate for delivery-tracker writes
